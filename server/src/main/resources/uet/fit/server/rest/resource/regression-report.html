<!DOCTYPE html>
<html>

<head>
	<style>
    .vertical>table {
      width: 100%;
      border-collapse: collapse;
      outline: 1px solid black;
      margin-top: 20px;
      margin-bottom: 20px;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 14px;
      font-weight: lighter;
    }

    .vertical>table>thead th {
      background-color: #338ac9;
      color: #ffffff;
      text-align: center;
      height: 30px;
    }

    .vertical>table>tbody {
      text-indent: 5px;
    }

    .vertical>table>tbody>tr {
      height: 30px;
    }

    .vertical>table>tbody>tr>th {
      background-color: #cfe2f4;
      text-align: left;
      border: 1px solid #b7b7b7;
    }

    .vertical>table>tbody>tr>td {
      text-align: left;
      border: 1px solid #b7b7b7;
    }

    .horizontal>table {
      width: 100%;
      border-collapse: collapse;
      outline: 1px solid black;
      margin-top: 10px;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 14px;
      font-weight: lighter;
    }

    .horizontal>table>thead th {
      background-color: #338ac9;
      color: #ffffff;
      text-align: center;
      height: 30px;
    }

    .horizontal>table>tbody {
      text-indent: 5px;
    }

    .horizontal>table>tbody>tr {
      height: 30px;
    }

    .horizontal>table>tbody>tr>th {
      background-color: #cfe2f4;
      border: 1px solid #b7b7b7;
    }

    .horizontal>table>tbody>tr>td {
      text-align: center;
      border: 1px solid #b7b7b7;
    }

    .commit {
      margin-top: 60px;
    }

    .commit>p {
      text-align: center;
      font-size: x-large;
    }
  </style>
</head>

<body>
<div class="vertical">
	<table>
		<thead>
		<tr>
			<th colspan="2">Regression Information</th>
		</tr>
		</thead>
		<tbody>
		<!--{{INFORMATION_TABLE}}-->
		</tbody>
	</table>
</div>
<!--{{CONTENT_TABLE}}-->
</body>

</html>
